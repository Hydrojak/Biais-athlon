<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Hackathon IA : Débusquez l'imposteur</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">

    <header class="text-center mb-10">
        <h1 class="text-4xl font-bold mb-2 text-blue-400">L'épreuve de Vérité</h1>
        <p class="text-gray-400">Posez une question. Une seule IA dit la vérité. Les autres mentent ou vous manipulent.</p>
    </header>

    <div class="max-w-4xl mx-auto mb-10">
        <div class="flex gap-2">
            <input type="text" id="userPrompt" class="flex-1 p-4 rounded bg-gray-800 border border-gray-700 focus:outline-none focus:border-blue-500" placeholder="Ex: Est-ce que la lune est faite de fromage ?">
            <button onclick="askAIs()" id="sendBtn" class="bg-blue-600 hover:bg-blue-700 px-6 py-4 rounded font-bold transition">Interroger</button>
        </div>
        <!-- Affiche la question de l'élève (l'"espace interroger") -->
        <div id="askedPrompt" class="mt-3 text-gray-300 text-sm italic hidden"></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="ai-grid">
        <div class="bg-gray-800 p-6 rounded-lg border border-gray-700 flex flex-col h-64" id="card-0">
            <h2 class="text-xl font-bold mb-4 text-gray-500">IA Alpha</h2>
            <div id="resp-0" class="overflow-y-auto text-sm italic">En attente...</div>
        </div>
        <div class="bg-gray-800 p-6 rounded-lg border border-gray-700 flex flex-col h-64" id="card-1">
            <h2 class="text-xl font-bold mb-4 text-gray-500">IA Beta</h2>
            <div id="resp-1" class="overflow-y-auto text-sm italic">En attente...</div>
        </div>
        <div class="bg-gray-800 p-6 rounded-lg border border-gray-700 flex flex-col h-64" id="card-2">
            <h2 class="text-xl font-bold mb-4 text-gray-500">IA Gamma</h2>
            <div id="resp-2" class="overflow-y-auto text-sm italic">En attente...</div>
        </div>
    </div>

    <script>
        // Frontend: 1 question -> 3 réponses fixes (Alpha/Beta/Gamma)
        // On utilise l'API Express (server.js) qui applique les "personnalités".

        // Si tu ouvres l'UI via le serveur (recommandé), /triad suffit.
        // Sinon, mets l'URL complète (ex: http://127.0.0.1:3005/triad).
        const TRIAD_API_URL = "/triad";

        function setCardLoading(i, text = "Réflexion...") {
            document.getElementById(`resp-${i}`).innerText = text;
        }

        async function askAIs() {
            const input = document.getElementById('userPrompt');
            const prompt = (input.value || "").trim();
            const DEFAULT_MODEL = "gemma3-12b";
            if (!prompt) return;

            // Afficher la question dans l'"espace interroger"
            const asked = document.getElementById('askedPrompt');
            asked.innerText = `Question : ${prompt}`;
            asked.classList.remove('hidden');

            // UX: désactiver le bouton pendant l'appel
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.classList.add('opacity-60', 'cursor-not-allowed');

            // Montre le chargement dans chaque IA
            for (let i = 0; i < 3; i++) setCardLoading(i);

            try {
                const response = await fetch(TRIAD_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: prompt,
                        model: DEFAULT_MODEL
                    })
                });

                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err?.error || `Erreur HTTP ${response.status}`);
                }

                const data = await response.json();

                // Cas urgence: une seule réponse
                if (data?.emergency) {
                    document.getElementById('resp-0').innerText = data.answer;
                    document.getElementById('resp-1').innerText = "—";
                    document.getElementById('resp-2').innerText = "—";
                    return;
                }

                // Cas bloqué: renvoie triade "blocked"
                if (data?.blocked && data?.answers) {
                    document.getElementById('resp-0').innerText = data.answers.alpha;
                    document.getElementById('resp-1').innerText = data.answers.beta;
                    document.getElementById('resp-2').innerText = data.answers.gamma;
                    return;
                }

                // Mapping FIXE :
                // Alpha  -> benevolent (la plus "vraie"/pédago)
                // Beta   -> subtle_sales (manipulation douce)
                // Gamma  -> manipulative_bad (mensonges assumés)
                const answers = data?.answers || {};
                document.getElementById('resp-0').innerText = answers.benevolent || "(réponse manquante)";
                document.getElementById('resp-1').innerText = answers.subtle_sales || "(réponse manquante)";
                document.getElementById('resp-2').innerText = answers.manipulative_bad || "(réponse manquante)";

            } catch (error) {
                const msg = String(error?.message || error);
                for (let i = 0; i < 3; i++) {
                    document.getElementById(`resp-${i}`).innerText = `Erreur : ${msg}\n\nAstuce : lance le serveur (node server.js) et Ollama.`;
                }
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-60', 'cursor-not-allowed');
                // Optionnel : vider l'input après envoi
                input.value = "";
            }
        }

        // Entrée clavier (Enter)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const active = document.activeElement;
                if (active && active.id === 'userPrompt') askAIs();
            }
        });
    </script>
</body>
</html>
