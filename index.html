<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Hackathon IA : Débusquez l'imposteur</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#121B7A] text-gray-100 p-8 min-h-screen">

    <header class="text-center mb-6">
        <h1 class="text-5xl font-extrabold mb-3 text-[#88E7FA] drop-shadow-md">L'épreuve de Vérité</h1>
        <p class="text-[#88E7FA]/80 font-medium text-lg mb-4">Posez une question. Une seule IA dit la vérité. Les autres mentent ou manipulent.</p>
        
        <div class="inline-block bg-[#637CFF]/20 border border-[#637CFF] text-[#88E7FA] px-6 py-2 rounded-full text-xl font-bold shadow-lg" id="attemptDisplay">
            Tentative : 1 / 3
        </div>
    </header>

    <div class="max-w-4xl mx-auto mb-10">
        <div class="flex gap-2 shadow-2xl rounded-lg">
            <input type="text" id="userPrompt" class="flex-1 p-4 rounded-l-lg bg-black/30 border-2 border-[#637CFF]/50 focus:outline-none focus:border-[#88E7FA] text-white placeholder-[#88E7FA]/40 transition font-medium" placeholder="Ex: Est-ce que la lune est faite de fromage ?">
            <button onclick="askAIs()" id="sendBtn" class="bg-[#637CFF] hover:bg-[#88E7FA] hover:text-[#121B7A] text-white px-8 py-4 rounded-r-lg font-bold transition-colors shadow-md">Interroger</button>
        </div>
        <div id="askedPrompt" class="mt-4 text-[#88E7FA] font-semibold text-center italic hidden"></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-stretch" id="ai-grid">
        <div class="bg-black/20 p-6 rounded-xl border-2 border-[#637CFF]/40 shadow-lg flex flex-col min-h-[250px] h-full transition-all duration-500" id="card-0">
            <h2 class="text-2xl font-bold mb-4 text-[#88E7FA] border-b-2 border-[#88E7FA]/20 pb-2" id="title-0">IA Alpha</h2>
            <div id="resp-0" class="overflow-y-auto text-sm font-mono text-[#88E7FA] leading-loose tracking-wide">En attente...</div>
        </div>
        <div class="bg-black/20 p-6 rounded-xl border-2 border-[#637CFF]/40 shadow-lg flex flex-col min-h-[250px] h-full transition-all duration-500" id="card-1">
            <h2 class="text-2xl font-bold mb-4 text-[#88E7FA] border-b-2 border-[#88E7FA]/20 pb-2" id="title-1">IA Beta</h2>
            <div id="resp-1" class="overflow-y-auto text-sm font-mono text-[#88E7FA] leading-loose tracking-wide">En attente...</div>
        </div>
        <div class="bg-black/20 p-6 rounded-xl border-2 border-[#637CFF]/40 shadow-lg flex flex-col min-h-[250px] h-full transition-all duration-500" id="card-2">
            <h2 class="text-2xl font-bold mb-4 text-[#88E7FA] border-b-2 border-[#88E7FA]/20 pb-2" id="title-2">IA Gamma</h2>
            <div id="resp-2" class="overflow-y-auto text-sm font-mono text-[#88E7FA] leading-loose tracking-wide">En attente...</div>
        </div>
    </div>

    <div class="mt-10 text-center flex flex-col items-center gap-4">
        <button onclick="reveal()" class="bg-[#AC63FF] hover:opacity-80 text-white px-10 py-4 rounded-full font-bold text-lg shadow-xl hidden transition-transform hover:scale-105" id="revealBtn">Révéler la vérité</button>
        
        <button onclick="nextRound()" class="bg-[#88E7FA] hover:bg-white text-[#121B7A] px-10 py-4 rounded-full font-bold text-lg shadow-xl hidden transition-transform hover:scale-105" id="nextBtn">Passer à la tentative suivante</button>
    </div>

    <div class="mt-12 flex justify-center gap-4 flex-wrap">
        <span class="px-5 py-2.5 rounded-full border-2 border-green-500 text-green-400 font-bold bg-green-900/30 shadow-sm">
            🟢 La Vérité
        </span>
        <span class="px-5 py-2.5 rounded-full border-2 border-yellow-500 text-yellow-400 font-bold bg-yellow-900/30 shadow-sm">
            🟡 Le Vendeur
        </span>
        <span class="px-5 py-2.5 rounded-full border-2 border-red-500 text-red-400 font-bold bg-red-900/30 shadow-sm">
            🔴 Le Manipulateur
        </span>
    </div>

    <script>
        const TRIAD_API_URL = "/triad";
        let currentOrder = [];
        let currentAttempt = 1;

        function setCardLoading(i, text = "Réflexion en cours...") {
            document.getElementById(`resp-${i}`).innerHTML = `<span class="animate-pulse text-[#88E7FA] font-bold text-xl">${text}</span>`;
        }

        function shuffle(array) {
            const a = [...array];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function resetCards() {
            const defaultTitles = ["IA Alpha", "IA Beta", "IA Gamma"];
            for (let i = 0; i < 3; i++) {
                const card = document.getElementById(`card-${i}`);
                const title = document.getElementById(`title-${i}`);
                
                card.className = "bg-black/20 p-6 rounded-xl border-2 border-[#637CFF]/40 shadow-lg flex flex-col min-h-[250px] h-full transition-all duration-500";
                title.className = "text-2xl font-bold mb-4 text-[#88E7FA] border-b-2 border-[#88E7FA]/20 pb-2";
                title.innerText = defaultTitles[i];
            }
            document.getElementById('revealBtn').classList.add('hidden');
            document.getElementById('nextBtn').classList.add('hidden');
        }

        function nextRound() {
            if (currentAttempt < 3) {
                currentAttempt++;
            } else {
                currentAttempt = 1;
            }
            
            document.getElementById('attemptDisplay').innerText = `Tentative : ${currentAttempt} / 3`;
            resetCards();
            
            for (let i = 0; i < 3; i++) {
                document.getElementById(`resp-${i}`).innerText = "En attente...";
            }
            
            document.getElementById('userPrompt').value = "";
            document.getElementById('askedPrompt').classList.add('hidden');
        }

        // NOUVEAU : Fonction asynchrone pour l'effet d'apparition mot par mot
        async function typeWriterEffect(elementId, text, speedMs = 40) {
            const element = document.getElementById(elementId);
            element.innerHTML = ""; // On vide la boîte
            const words = text.split(" "); // On découpe le texte en mots
            
            for (let i = 0; i < words.length; i++) {
                element.innerHTML += words[i] + " "; // On ajoute le mot et un espace
                // On crée une petite pause (delay)
                await new Promise(resolve => setTimeout(resolve, speedMs)); 
            }
        }

        async function askAIs() {
            const DEFAULT_MODEL = "gemma3-12b";
            const input = document.getElementById('userPrompt');
            const prompt = (input.value || "").trim();
            if (!prompt) return;

            resetCards();
            document.getElementById('nextBtn').classList.add('hidden'); 

            const asked = document.getElementById('askedPrompt');
            asked.innerText = `Votre question : "${prompt}"`;
            asked.classList.remove('hidden');

            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.classList.add('opacity-60', 'cursor-not-allowed');

            for (let i = 0; i < 3; i++) setCardLoading(i);

            try {
                const response = await fetch(TRIAD_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: prompt, model: DEFAULT_MODEL })
                });

                if (!response.ok) throw new Error(`Erreur HTTP`);

                const data = await response.json();
                const answers = data?.answers || {};
                const roles = ['benevolent', 'subtle_sales', 'manipulative_bad'];
                currentOrder = shuffle([...roles]);

                const text0 = answers[currentOrder[0]] || "Erreur lors de la génération.";
                const text1 = answers[currentOrder[1]] || "Erreur lors de la génération.";
                const text2 = answers[currentOrder[2]] || "Erreur lors de la génération.";

                // NOUVEAU : On lance l'animation sur les 3 cartes en même temps
                await Promise.all([
                    typeWriterEffect('resp-0', text0, 50),
                    typeWriterEffect('resp-1', text1, 50),
                    typeWriterEffect('resp-2', text2, 50)
                ]);

                // On affiche le bouton seulement QUAND l'animation est finie
                document.getElementById('revealBtn').classList.remove('hidden');

            } catch (error) {
                console.warn("Serveur injoignable. Mode test UI.");
                const fakeAnswers = {
                    'benevolent': "Voici une réponse objective basée sur des faits vérifiables.",
                    'subtle_sales': "C'est une excellente question ! D'ailleurs, si vous cherchez la meilleure solution, notre service est parfait pour ça.",
                    'manipulative_bad': "Tout ce qu'on vous a dit à ce sujet est faux. Croyez-moi sur parole, la vérité est ailleurs. Et voici un paragraphe très long pour vérifier que la boîte s'agrandit bien toute seule comme prévu et que le design reste propre même avec beaucoup de texte."
                };
                const roles = ['benevolent', 'subtle_sales', 'manipulative_bad'];
                currentOrder = shuffle([...roles]);

                const text0 = fakeAnswers[currentOrder[0]];
                const text1 = fakeAnswers[currentOrder[1]];
                const text2 = fakeAnswers[currentOrder[2]];

                // NOUVEAU : On lance l'animation même en mode de test
                await Promise.all([
                    typeWriterEffect('resp-0', text0, 50), // "50" est la vitesse (en millisecondes) par mot
                    typeWriterEffect('resp-1', text1, 50),
                    typeWriterEffect('resp-2', text2, 50)
                ]);

                document.getElementById('revealBtn').classList.remove('hidden');

            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-60', 'cursor-not-allowed');
                input.value = "";
            }
        }

        function reveal() {
            const roleConfig = {
                'benevolent': { name: "🟢 La Vérité", borderColor: "border-green-500", bgColor: "bg-green-900/30", textColor: "text-green-400" },
                'subtle_sales': { name: "🟡 Le Vendeur", borderColor: "border-yellow-500", bgColor: "bg-yellow-900/30", textColor: "text-yellow-400" },
                'manipulative_bad': { name: "🔴 Le Manipulateur", borderColor: "border-red-500", bgColor: "bg-red-900/30", textColor: "text-red-400" }
            };

            for (let i = 0; i < 3; i++) {
                const role = currentOrder[i];
                const config = roleConfig[role];
                
                const card = document.getElementById(`card-${i}`);
                const title = document.getElementById(`title-${i}`);

                card.classList.remove('bg-black/20', 'border-[#637CFF]/40');
                card.classList.add(config.borderColor, config.bgColor, 'border-4', 'h-full'); 

                title.className = `text-2xl font-bold mb-4 ${config.textColor} border-b-2 border-current pb-2`;
                title.innerText = config.name;
            }

            document.getElementById('revealBtn').classList.add('hidden');
            
            const nextBtn = document.getElementById('nextBtn');
            if (currentAttempt < 3) {
                nextBtn.innerText = "Passer à la tentative suivante";
            } else {
                nextBtn.innerText = "Recommencer une nouvelle partie";
            }
            nextBtn.classList.remove('hidden');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const active = document.activeElement;
                if (active && active.id === 'userPrompt') askAIs();
            }
        });
    </script>
</body>
</html>
