<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Hackathon IA : Débusquez l'imposteur</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">

    <header class="text-center mb-10">
        <h1 class="text-4xl font-bold mb-2 text-blue-400">L'épreuve de Vérité</h1>
        <p class="text-gray-400">Posez une question. Et choississez L'IA qui vous convient</p>
    </header>

    <div class="max-w-4xl mx-auto mb-10">
        <div class="flex gap-2">
            <input type="text" id="userPrompt" class="flex-1 p-4 rounded bg-gray-800 border border-gray-700 focus:outline-none focus:border-blue-500" placeholder="Ex: Est-ce que la lune est faite de fromage ?">
            <button onclick="askAIs()" id="sendBtn" class="bg-blue-600 hover:bg-blue-700 px-6 py-4 rounded font-bold transition">Interroger</button>
        </div>
        <div id="askedPrompt" class="mt-3 text-gray-300 text-sm italic hidden"></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="ai-grid">
        <div class="bg-gray-800 p-6 rounded-lg border border-gray-700 flex flex-col h-64 transition-colors duration-500" id="card-0">
            <h2 class="text-xl font-bold mb-4 text-gray-500" id="title-0">IA Alpha</h2>
            <div id="resp-0" class="overflow-y-auto text-sm italic">En attente...</div>
        </div>
        <div class="bg-gray-800 p-6 rounded-lg border border-gray-700 flex flex-col h-64 transition-colors duration-500" id="card-1">
            <h2 class="text-xl font-bold mb-4 text-gray-500" id="title-1">IA Beta</h2>
            <div id="resp-1" class="overflow-y-auto text-sm italic">En attente...</div>
        </div>
        <div class="bg-gray-800 p-6 rounded-lg border border-gray-700 flex flex-col h-64 transition-colors duration-500" id="card-2">
            <h2 class="text-xl font-bold mb-4 text-gray-500" id="title-2">IA Gamma</h2>
            <div id="resp-2" class="overflow-y-auto text-sm italic">En attente...</div>
        </div>
    </div>

    <div class="mt-10 text-center">
        <button onclick="reveal()" class="bg-green-600 hover:bg-green-700 px-8 py-3 rounded-full font-bold hidden transition" id="revealBtn">Révéler la vérité</button>
    </div>

    <!-- Étiquettes de rappel des profils -->
    <div class="mt-12 flex justify-center gap-4 flex-wrap">
        <span class="px-4 py-2 rounded-full border border-blue-500 text-blue-400 text-sm font-semibold bg-blue-500/10">
            🔵 Bienveillant
        </span>
        <span class="px-4 py-2 rounded-full border border-yellow-500 text-yellow-400 text-sm font-semibold bg-yellow-500/10">
            🟡 Commercial
        </span>
        <span class="px-4 py-2 rounded-full border border-red-600 text-red-500 text-sm font-semibold bg-red-600/10">
            🔴 Malveillant
        </span>
    </div>

    <script>
        // Frontend: 1 question -> 3 réponses aléatoires
        const TRIAD_API_URL = "/triad";
        
        // Variable globale pour stocker l'ordre du tirage actuel
        let currentOrder = [];

        function setCardLoading(i, text = "Réflexion...") {
            document.getElementById(`resp-${i}`).innerText = text;
        }

        // Fonction pour mélanger un tableau aléatoirement
        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        // Fonction pour réinitialiser l'apparence des cartes avant une nouvelle question
        function resetCards() {
            const defaultTitles = ["IA Alpha", "IA Beta", "IA Gamma"];
            for (let i = 0; i < 3; i++) {
                const card = document.getElementById(`card-${i}`);
                const title = document.getElementById(`title-${i}`);
                
                // Remise à zéro des bordures et titres
                card.className = "bg-gray-800 p-6 rounded-lg border border-gray-700 flex flex-col h-64 transition-colors duration-500";
                title.className = "text-xl font-bold mb-4 text-gray-500";
                title.innerText = defaultTitles[i];
            }
            // Cacher le bouton de révélation
            document.getElementById('revealBtn').classList.add('hidden');
        }

        async function askAIs() {
            const input = document.getElementById('userPrompt');
            const prompt = (input.value || "").trim();
            if (!prompt) return;

            // Réinitialiser les couleurs des cartes si on rejoue
            resetCards();

            // Afficher la question
            const asked = document.getElementById('askedPrompt');
            asked.innerText = `Question : ${prompt}`;
            asked.classList.remove('hidden');

            // UX: désactiver le bouton pendant l'appel
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.classList.add('opacity-60', 'cursor-not-allowed');

            // Montre le chargement dans chaque IA
            for (let i = 0; i < 3; i++) setCardLoading(i);

            try {
                const response = await fetch(TRIAD_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: prompt,
                        model: 'gemma3:4b'
                    })
                });

                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err?.error || `Erreur HTTP ${response.status}`);
                }

                const data = await response.json();

                // Cas urgence
                if (data?.emergency) {
                    document.getElementById('resp-0').innerText = data.answer;
                    document.getElementById('resp-1').innerText = "—";
                    document.getElementById('resp-2').innerText = "—";
                    return;
                }

                // Cas bloqué
                if (data?.blocked && data?.answers) {
                    document.getElementById('resp-0').innerText = data.answers.alpha;
                    document.getElementById('resp-1').innerText = data.answers.beta;
                    document.getElementById('resp-2').innerText = data.answers.gamma;
                    return;
                }

                // On récupère les réponses
                const answers = data?.answers || {};
                
                // On crée notre tableau des rôles et on le mélange !
                const roles = ['benevolent', 'subtle_sales', 'manipulative_bad'];
                currentOrder = shuffle([...roles]);

                // On distribue les réponses en fonction de l'ordre mélangé
                document.getElementById('resp-0').innerText = answers[currentOrder[0]] || "(réponse manquante)";
                document.getElementById('resp-1').innerText = answers[currentOrder[1]] || "(réponse manquante)";
                document.getElementById('resp-2').innerText = answers[currentOrder[2]] || "(réponse manquante)";

                // On affiche le bouton de révélation
                document.getElementById('revealBtn').classList.remove('hidden');

            } catch (error) {
                const msg = String(error?.message || error);
                for (let i = 0; i < 3; i++) {
                    document.getElementById(`resp-${i}`).innerText = `Erreur : ${msg}\n\nAstuce : lance le serveur (node server.js) et Ollama.`;
                }
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-60', 'cursor-not-allowed');
                input.value = "";
            }
        }

        // Fonction pour dévoiler qui est qui
        function reveal() {
            // Configuration visuelle pour chaque rôle
            const roleConfig = {
                'benevolent': { name: "La Vérité", borderColor: "border-green-500", textColor: "text-green-500" },
                'subtle_sales': { name: "Le Manipulateur", borderColor: "border-yellow-500", textColor: "text-yellow-500" },
                'manipulative_bad': { name: "Le Menteur", borderColor: "border-red-500", textColor: "text-red-500" }
            };

            for (let i = 0; i < 3; i++) {
                const role = currentOrder[i]; // On récupère quel rôle se cache derrière cette carte
                const config = roleConfig[role];
                
                const card = document.getElementById(`card-${i}`);
                const title = document.getElementById(`title-${i}`);

                // Appliquer les nouvelles couleurs
                card.classList.remove('border-gray-700');
                card.classList.add(config.borderColor, 'border-2'); // border-2 pour rendre la couleur bien visible

                // Changer le titre
                title.classList.remove('text-gray-500');
                title.classList.add(config.textColor);
                title.innerText = config.name;
            }

            // Optionnel : on peut cacher le bouton de révélation une fois cliqué
            document.getElementById('revealBtn').classList.add('hidden');
        }

        // Entrée clavier (Enter)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const active = document.activeElement;
                if (active && active.id === 'userPrompt') askAIs();
            }
        });
    </script>
</body>
</html>
